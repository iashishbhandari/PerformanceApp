<!DOCTYPE html>
<html>
<head>
  <title>iOS CI Dashboard</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
  <style>
    body { background:#111; color:white; font-family:Arial, sans-serif; padding:10px; }
    h1,h2 { margin:10px 0; }
    .chart-container {
      background:white; padding:10px; border-radius:10px; margin-bottom:20px;
      box-shadow: 0 2px 8px rgba(0,0,0,0.3);
    }
    canvas { width:100% !important; height:200px !important; }
  </style>
</head>
<body>
<h1>iOS CI Metrics Dashboard</h1>

<div class="chart-container">
  <h2>Build Time (sec)</h2>
  <canvas id="buildTimeChart"></canvas>
</div>

<div class="chart-container">
  <h2>Test Duration (sec)</h2>
  <canvas id="testDurationChart"></canvas>
</div>

<div class="chart-container">
  <h2>Binary Size (MB)</h2>
  <canvas id="binarySizeChart"></canvas>
</div>

<div class="chart-container">
  <h2>Startup Time (ms)</h2>
  <canvas id="startupChart"></canvas>
</div>

<script>
async function loadMetrics() {
  try {
    const res = await fetch("ci_metrics_history.json");
    const metrics = await res.json();

    const labels = metrics.map((_, i) => i + 1);

    // Build Time
    new Chart(document.getElementById("buildTimeChart"), {
      type: "line",
      data: { labels, datasets: [{ label:"Build Time (sec)", data: metrics.map(m=>m.build_time_sec), borderColor:"lime", tension:0.3 }] }
    });

    // Test Duration
    new Chart(document.getElementById("testDurationChart"), {
      type: "line",
      data: { labels, datasets: [{ label:"Test Duration (sec)", data: metrics.map(m=>m.test_results.duration_sec), borderColor:"orange", tension:0.3 }] }
    });

    // Binary Size
    new Chart(document.getElementById("binarySizeChart"), {
      type: "line",
      data: { labels, datasets: [{ label:"Binary Size (MB)", data: metrics.map(m=>m.binary_size_mb), borderColor:"blue", tension:0.3 }] }
    });

    // Startup Time
    new Chart(document.getElementById("startupChart"), {
      type: "line",
      data: { labels, datasets: [{ label:"Startup Time (ms)", data: metrics.map(m=>m.startup_time_ms), borderColor:"red", tension:0.3 }] }
    });

  } catch(e) {
    console.error("Failed to load metrics:", e);
  }
}

loadMetrics();
</script>
</body>
</html>
