name: iOS CI Metrics

on:
  push:
    branches: [ main ]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-test-metrics:
    runs-on: macos-latest

    steps:

      # Checkout repository
      - name: Checkout code
        uses: actions/checkout@v4

      # Setup Python
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.x"

      # Install dependencies
      - name: Install Python dependencies
        run: pip install psutil

      # Install CocoaPods (only if Podfile exists)
      - name: Install CocoaPods
        run: |
          if [ -f "Podfile" ]; then
            pod install
          fi

      # Generate CI Metrics
      - name: Generate CI Metrics
        run: python3 ci_metrics.py

      # Upload artifact
      - name: Upload Metrics Artifact
        uses: actions/upload-artifact@v4
        with:
          name: ci_metrics_history
          path: ci_metrics_history.json

      # Deploy metrics to GitHub Pages
      - name: Deploy dashboard data
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          git config --global user.name "github-actions"
          git config --global user.email "github-actions@github.com"

          git clone https://x-access-token:${GITHUB_TOKEN}@github.com/${{ github.repository }}.git gh-pages
          cd gh-pages

          git checkout gh-pages || git checkout -b gh-pages

          mkdir -p dashboard
          cp ../ci_metrics_history.json dashboard/

          git add dashboard/ci_metrics_history.json
          git commit -m "Update CI metrics" || echo "No changes"

          git push origin gh-pages
